name: Go Unit Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/**'
      - '.goreleaser.yml'
      - 'README.md'
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/**'
      - '.goreleaser.yml'
      - 'README.md'

jobs:
  tests:
    name: Go Tests
    runs-on: self-hosted
    timeout-minutes: 60
    
    # Global environment variables for the job
    env:
      GOPRIVATE: "gopkg.volterra.us,gitlab.com/f5/*"
      GOTOOLCHAIN: "local"
      # Set terminal prompt to 0 here to prevent Git from hanging on authentication
      GIT_TERMINAL_PROMPT: "0"

    steps:
      # 1. Reset permissions if the previous run left root-owned files (common on self-hosted)
      - name: Cleanup workspace permissions
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE
        continue-on-error: true

      # 2. Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Install Go environment
      - name: Install Go
        uses: actions/setup-go@v5 # Note: v5 is currently the stable version
        with:
          go-version: '1.23'
          cache: true
        id: go

      # 4. Configure Git to use Personal Access Token for private GitLab modules
      - name: Configure Git for Private Modules
        run: |
          # Rewrite GitLab URLs to include the OAuth2 token for authentication
          # Using the PAT from secrets to access private f5/ repositories
          git config --global url."https://oauth2:${{ secrets.GITLAB_PAT }}@gitlab.com/".insteadOf "https://gitlab.com/"

      # 5. Resolve and download dependencies
      - name: Go Mod Tidy
        run: go mod tidy

      # 6. Run custom make command for tidying (if applicable)
      - name: Make Tidy (Verify)
        run: make cmd-go-mod-tidy

      # 7. Run the actual test suite
      - name: Run tests
        run: |
          TF_ACC=1 go test -v ./... -timeout=30m
