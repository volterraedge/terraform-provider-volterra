name: Go Unit Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/**'
      - '.goreleaser.yml'
      - 'README.md'
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - '.github/workflows/**'
      - '.goreleaser.yml'
      - 'README.md'

jobs:
  tests:
    name: Go Tests
    runs-on: self-hosted
    timeout-minutes: 60
    
    # Set GOPRIVATE at job level to ensure all steps (go mod, make, go test) respect it
    env:
      GOPRIVATE: "gopkg.volterra.us,gitlab.com/f5/*"

    steps:
      # 1. Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Go environment
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true # Enables automatic caching for Go modules
        id: go

      # 3. Configure Git to use Personal Access Token for private GitLab modules
      - name: Configure Git for Private Modules
        run: |
          # Disable interactive terminal prompts to prevent hanging
          git config --global env.GIT_TERMINAL_PROMPT 0
          # Rewrite GitLab URLs to include the OAuth2 token for authentication
          git config --global url."https://oauth2:${{ secrets.GITLAB_PAT }}@gitlab.com/".insteadOf "https://gitlab.com/"

      # 4. Resolve and download dependencies
      - name: Go Mod Tidy
        run: go mod tidy

      # 5. Run custom make command for tidying (if applicable)
      - name: Make Tidy (Verify)
        run: make cmd-go-mod-tidy

      # 6. Run the actual test suite
      - name: Run tests
        run: |
          TF_ACC=1 go test -v ./... -timeout=30m
