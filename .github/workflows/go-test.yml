name: Go Unit Tests
on:
  push:
    branches:
    - main
    paths-ignore:
    - 'docs/**'
    - 'examples/**'
    - '.github/workflows/**'
    - '.goreleaser.yml'
    - 'README.md'
  pull_request:
    branches:
    - "*"
    paths-ignore:
    - 'docs/**'
    - 'examples/**'
    - '.github/workflows/**'
    - '.goreleaser.yml'
    - 'README.md'
jobs:
  tests:
    name: Go Tests
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
    - name: Install Go 1.23
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
      id: go

    - name: Configure Git for GitLab Access
      run: |
        git config --global url."https://oauth2:${{ secrets.GITLAB_PAT }}@gitlab.com/".insteadOf "https://gitlab.com/"

    - run: make cmd-go-mod-tidy

    #- run: make cmd-go-mod-vendor

    - name: Run tests
      run: |
        TF_ACC=1 go test -v ./... -timeout=30m
