# This GitHub action can publish assets for release when a tag is created.
# Currently its setup to run on any tag that matches the pattern "v*" (ie. v0.1.0).
#
name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: self-hosted
    # Ensure variables like GOPRIVATE are available for the build
    env:
      GOPRIVATE: "gopkg.volterra.us,gitlab.com/f5/*"
      GOTOOLCHAIN: "local"
      GIT_TERMINAL_PROMPT: "0"

    steps:
      # 1. Fix potential permission issues on self-hosted runner
      - name: Cleanup workspace permissions
        run: sudo chown -R $USER:$USER $GITHUB_WORKSPACE
        continue-on-error: true

      # 2. Checkout the repository (v4 is the current standard)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser works best with full history to determine changes

      # 3. Install Go 1.25
      - name: Set up Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # 4. Import GPG key for signing artifacts
      - name: Import GPG key
        id: import_gpg
        uses: paultyng/ghaction-import-gpg@v0.5.0 # Updated to v0.5.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      # 5. Configure Git for private modules
      - name: Configure git for private modules
        run: |
          git config --global url."https://oauth2:${{ secrets.GITLAB_PAT }}@gitlab.com/".insteadOf "https://gitlab.com/"

      # 6. Run GoReleaser
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6 # Updated to v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --timeout 60m # Added --clean (replaces --rm-dist)
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
